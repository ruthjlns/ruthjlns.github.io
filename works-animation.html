  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .works-category-content {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
      background-image: url('assets/images/assetanimation1pps.png');
      background-size: contain;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      position: relative;
    }

    .works-category-content::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.15);
      pointer-events: none;
    }

    .works-category-content h1 {
      font-family: var(--font-serif);
      font-size: 3rem;
      color: var(--color-white);
      text-align: center;
      opacity: 0.95;
      position: relative;
      z-index: 1;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 768px) {
      .works-category-content h1 {
        font-size: 2rem;
      }
    }

    @media (max-width: 480px) {
      .works-category-content h1 {
        font-size: 1.5rem;
      }

      .works-category-content {
        background-attachment: scroll;
      }
    }
  </style>
</head>
